<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Mahasiswa - KEL6</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; max-width: 300px; display: block;}
    </style>
</head>
<body>
    <h2>Registrasi Data Mahasiswa</h2>
    <input type="text" id="nim" placeholder="Masukkan NIM">
    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap">
    <button id="btnSimpan">Simpan ke Firebase</button>
    <br><a href="dashboard.html">Ke Halaman Dashboard</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGYyHrmLjr_1-ethZGHy60LgzypyrkA00",
            authDomain: "aiot-absensi-kel6.firebaseapp.com",
            projectId: "aiot-absensi-kel6",
            storageBucket: "aiot-absensi-kel6.firebasestorage.app",
            messagingSenderId: "566485062868",
            appId: "1:566485062868:web:a99601d74c4fbf0637d741",
            databaseURL: "https://aiot-absensi-kel6-default-rtdb.firebaseio.com/" // Pastikan ini sesuai
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById("btnSimpan").addEventListener("click", () => {
            const nim = document.getElementById("nim").value;
            const nama = document.getElementById("nama").value;
            
            set(ref(db, 'mahasiswa/' + nim), {
                nama: nama,
                nim: nim
            }).then(() => {
                alert("Data berhasil disimpan!");
            }).catch((error) => {
                alert("Gagal: " + error);
            });
        });
    </script>
</body>
</html>
