<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AIoT Absensi PNJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #EBF8FF; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 25px; box-shadow: 0 20px 40px rgba(66, 153, 225, 0.15); overflow: hidden; max-width: 900px; width: 100%; border: none; }
        .left-side { background: linear-gradient(135deg, #3182CE 0%, #2B6CB0 100%); color: white; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .right-side { padding: 60px 50px; }
        .form-control { border-radius: 12px; padding: 14px 20px; background: #F7FAFC; border: 2px solid #EDF2F7; }
        .form-control:focus { border-color: #4299E1; box-shadow: none; background: white; }
        .btn-login { background: #4299E1; color: white; border-radius: 12px; padding: 14px; font-weight: 600; transition: 0.3s; }
        .btn-login:hover { background: #2B6CB0; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card mx-auto">
            <div class="row g-0">
                <div class="col-md-5 left-side text-center">
                    <i class="fa-solid fa-face-viewfinder mb-4" style="font-size: 5rem; opacity: 0.9;"></i>
                    <h3 class="fw-bold mb-3">Portal Admin<br>TIK PNJ</h3>
                    <p style="opacity: 0.8; font-size: 0.9rem;">Sistem Informasi Manajemen Absensi Cerdas (AIoT) berbasis Face Recognition.</p>
                </div>
                <div class="col-md-7 right-side">
                    <h3 class="fw-bold text-dark mb-1">Selamat Datang 👋</h3>
                    <p class="text-muted mb-4">Silakan masuk menggunakan kredensial Anda.</p>
                    
                    {% if error %}
                    <div class="alert alert-danger rounded-4 py-2 px-3 mb-4" style="font-size: 0.9rem;">
                        <i class="fa-solid fa-circle-exclamation me-2"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark" style="font-size: 0.9rem;">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control border-0 bg-light" placeholder="Masukkan admin" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark" style="font-size: 0.9rem;">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control border-0 bg-light" placeholder="••••••••" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-login w-100 mb-3"><i class="fa-solid fa-arrow-right-to-bracket me-2"></i> Masuk Sistem</button>
                        <a href="/" class="btn btn-light w-100 fw-bold" style="border-radius: 12px; color: #718096;"><i class="fa-solid fa-arrow-left me-2"></i> Kembali ke Beranda</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
