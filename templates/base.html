<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIoT Smart Absensi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #F0F4F8; --surface: #ffffff; --text-main: #2D3748; --text-muted: #718096;
            --primary: #4299E1; --primary-soft: #EBF8FF; --success: #48BB78; --danger: #F56565;
        }
        body { background-color: var(--bg-color); font-family: 'Poppins', sans-serif; color: var(--text-main); }
        
        .sidebar { height: 100vh; background: var(--surface); position: fixed; width: 270px; padding: 30px 15px; z-index: 100; border-radius: 0 30px 30px 0; box-shadow: 4px 0 15px rgba(0,0,0,0.03); }
        .sidebar .brand { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 40px; color: var(--primary); }
        .sidebar a { padding: 14px 20px; text-decoration: none; font-size: 0.95rem; color: var(--text-muted); display: block; font-weight: 500; border-radius: 15px; margin-bottom: 8px; transition: 0.3s;}
        .sidebar a i { width: 30px; font-size: 1.1rem; }
        .sidebar a:hover { background: var(--bg-color); color: var(--primary); }
        .sidebar a.active { color: var(--primary); background: var(--primary-soft); font-weight: 600; box-shadow: 0 4px 6px rgba(66, 153, 225, 0.1); }
        
        .main-content { margin-left: 270px; padding: 40px; }
        .card { border: none; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); background: var(--surface); margin-bottom: 25px; }
        .form-control, .form-select { border-radius: 12px; border: 2px solid #edf2f7; padding: 12px 18px; background: #f7fafc; }
        .btn { border-radius: 12px; font-weight: 600; padding: 12px 20px; transition: all 0.3s; }
        h2.page-title { font-weight: 700; font-size: 1.8rem; color: var(--text-main); margin-bottom: 30px; letter-spacing: -0.5px; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-face-smile text-primary me-2"></i> AIoT Absensi
            <div style="font-size: 0.75rem; color: var(--text-muted); font-weight: 500; margin-top: 5px;">Kelompok 6 ✨</div>
        </div>
        <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}"><i class="fa-solid fa-desktop"></i> Mulai Absen</a>
        <a href="/registrasi" class="{% if active_page == 'registrasi' %}active{% endif %}"><i class="fa-solid fa-camera-retro"></i> Daftar Wajah</a>
        <a href="/master" class="{% if active_page == 'master' %}active{% endif %}"><i class="fa-solid fa-folder-open"></i> Data Master</a>
        <a href="/history" class="{% if active_page == 'history' %}active{% endif %}"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Kehadiran</a>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBGYyHrmLjr_1-ethZGHy60LgzypyrkA00",
            authDomain: "aiot-absensi-kel6.firebaseapp.com",
            projectId: "aiot-absensi-kel6",
            storageBucket: "aiot-absensi-kel6.firebasestorage.app",
            messagingSenderId: "566485062868",
            appId: "1:566485062868:web:a99601d74c4fbf0637d741",
            databaseURL: "https://aiot-absensi-kel6-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        window.db = getDatabase(initializeApp(firebaseConfig)); 
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
