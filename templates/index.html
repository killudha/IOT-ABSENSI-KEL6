<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard AIoT Absensi - KEL6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .video-feed { width: 100%; border-radius: 10px; border: 3px solid #203a43; }
        .table-container { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">🎓 AIoT Absensi Kelas - KELOMPOK 6</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-lg-7 mb-4">
                <div class="card p-3">
                    <h4 class="mb-3 text-center fw-bold text-secondary">Pemantauan Kelas (Live)</h4>
                    <img src="{{ url_for('video_feed') }}" class="video-feed" alt="Kamera Offline">
                    <div class="mt-3 text-center">
                        <span class="badge bg-success">Status: Sistem Aktif</span>
                        <span class="badge bg-info">Terhubung ke Wokwi ESP32</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-5 mb-4">
                <div class="card p-3">
                    <h4 class="mb-3 text-center fw-bold text-secondary">Log Kehadiran</h4>
                    <div class="table-container">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark sticky-top">
                                <tr>
                                    <th>Waktu</th>
                                    <th>Nama</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="tabelAbsen">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGYyHrmLjr_1-ethZGHy60LgzypyrkA00",
            authDomain: "aiot-absensi-kel6.firebaseapp.com",
            projectId: "aiot-absensi-kel6",
            storageBucket: "aiot-absensi-kel6.firebasestorage.app",
            messagingSenderId: "566485062868",
            appId: "1:566485062868:web:a99601d74c4fbf0637d741",
            databaseURL: "https://aiot-absensi-kel6-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const absenRef = ref(db, 'log_absensi/');

        onValue(absenRef, (snapshot) => {
            const table = document.getElementById("tabelAbsen");
            table.innerHTML = ""; 
            
            // Konversi snapshot ke array agar bisa di-reverse (data terbaru di atas)
            let dataArray = [];
            snapshot.forEach((childSnapshot) => {
                dataArray.push(childSnapshot.val());
            });
            dataArray.reverse(); 

            dataArray.forEach((data) => {
                const row = `<tr>
                    <td><small>${data.waktu.split(' ')[1]}</small></td>
                    <td class="fw-bold">${data.nama}</td>
                    <td><span class="badge bg-success">Hadir</span></td>
                </tr>`;
                table.innerHTML += row;
            });
        });
    </script>
</body>
</html>
