{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title m-0">Manajemen Data Master 📂</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTambahData">
        <i class="fa-solid fa-plus me-2"></i> Tambah Data Baru
    </button>
</div>

<div class="card p-4">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h5 class="fw-bold m-0"><i class="fa-solid fa-list me-2 text-primary"></i> Database Tersimpan</h5>
        <select id="filterKategori" class="form-select w-auto fw-bold" style="background: var(--primary-soft); color: var(--primary); border:none;">
            <option value="jurusan">Tabel Jurusan</option>
            <option value="prodi">Tabel Prodi</option>
            <option value="kelas">Tabel Kelas</option>
            <option value="dosen">Tabel Dosen</option>
            <option value="mahasiswa">Lihat Mahasiswa Terdaftar</option>
        </select>
    </div>
    
    <div class="table-responsive">
        <table class="table table-borderless align-middle">
            <thead class="table-light" style="border-bottom: 2px solid #edf2f7;">
                <tr><th class="ps-3">Kode/ID</th><th>Keterangan Data</th><th>Aksi</th></tr>
            </thead>
            <tbody id="tabelData">
                <tr><td colspan="3" class="text-center py-5 text-muted">Memuat data dari server...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalTambahData" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <div class="modal-header border-0 pt-4 px-4">
                <h5 class="modal-title fw-bold text-primary"><i class="fa-solid fa-pen-to-square me-2"></i> Input Data</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 pt-2">
                <div class="mb-3">
                    <label class="form-label fw-bold">Simpan ke Kategori</label>
                    <select id="inputKategori" class="form-select">
                        <option value="jurusan">Jurusan</option><option value="prodi">Program Studi</option>
                        <option value="kelas">Kelas</option><option value="dosen">Dosen</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Kode Unik / ID</label>
                    <input type="text" id="inputKode" class="form-control" placeholder="Contoh: TI-6A / NIP 123">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Nama Lengkap / Deskripsi</label>
                    <input type="text" id="inputNama" class="form-control" placeholder="Tuliskan keterangan lengkap...">
                </div>
                <button id="btnSimpan" class="btn btn-primary w-100 py-3 fs-6"><i class="fa-solid fa-save me-2"></i> Simpan ke Database</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
    import { ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    
    document.getElementById('btnSimpan').addEventListener('click', () => {
        const kat = document.getElementById('inputKategori').value;
        const kode = document.getElementById('inputKode').value;
        const nama = document.getElementById('inputNama').value;
        if(!kode || !nama) return alert("Lengkapi data form!");
        
        set(ref(window.db, `master/${kat}/${kode}`), { id: kode, nama: nama }).then(() => {
            alert("Data berhasil tersimpan!");
            bootstrap.Modal.getInstance(document.getElementById('modalTambahData')).hide();
            document.getElementById('inputKode').value = ''; document.getElementById('inputNama').value = '';
            document.getElementById('filterKategori').value = kat;
            loadData(kat);
        });
    });

    document.getElementById('filterKategori').addEventListener('change', (e) => loadData(e.target.value));
    
    function loadData(kat) {
        const tbody = document.getElementById('tabelData');
        const dbNode = kat === 'mahasiswa' ? 'mahasiswa' : `master/${kat}`;
        
        onValue(ref(window.db, dbNode), (snapshot) => {
            tbody.innerHTML = '';
            if(!snapshot.exists()) { tbody.innerHTML = `<tr><td colspan="3" class="text-center py-5 text-muted">Belum ada data untuk tabel ini.</td></tr>`; return; }
            
            snapshot.forEach((child) => {
                if(kat === 'mahasiswa') {
                    child.forEach(mhs => {
                        const data = mhs.val();
                        addRow(dbNode + '/' + child.key, data.nim, `<span class="fw-bold">${data.nama}</span><br><small class="text-muted">Kelas: ${data.kelas}</small>`);
                    });
                } else {
                    const data = child.val();
                    addRow(dbNode, data.id, data.nama);
                }
            });
        }, { onlyOnce: true });
    }
    
    function addRow(path, id, info) {
        const tbody = document.getElementById('tabelData');
        const row = document.createElement('tr');
        row.innerHTML = `<td class="ps-3 fw-bold text-primary">${id}</td><td>${info}</td>
                         <td><button class="btn btn-sm btn-danger px-3 rounded-pill btn-del" data-path="${path}/${id}"><i class="fa-solid fa-trash"></i></button></td>`;
        tbody.appendChild(row);
        row.querySelector('.btn-del').addEventListener('click', function() {
            if(confirm("Yakin hapus data ini?")) remove(ref(window.db, this.getAttribute('data-path'))).then(() => loadData(document.getElementById('filterKategori').value));
        });
    }
    loadData('jurusan');
</script>
{% endblock %}
